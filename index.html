<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Analizador Táctico de Duelos - Rutxe Edition</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background-color: #1a1a1a; color: #eee; padding: 20px; }
        .container { max-width: 1000px; margin: auto; background: #252525; padding: 20px; border-radius: 8px; border: 1px solid #444; }
        h1 { text-align: center; color: #f39c12; text-transform: uppercase; }
        
        .setup-section { display: flex; flex-wrap: wrap; gap: 20px; justify-content: space-around; margin-bottom: 30px; }
        .armor-card { background: #333; padding: 10px; border-radius: 5px; text-align: center; width: 180px; }
        .armor-title { font-size: 0.8em; color: #aaa; margin-bottom: 5px; }
        
        select { background: #444; color: white; border: 1px solid #666; padding: 5px; width: 100%; margin-top: 5px; }
        
        textarea { width: 100%; height: 120px; background: #111; color: #0f0; border: 1px solid #555; padding: 10px; font-family: monospace; margin-top: 10px; }
        
        button { width: 100%; padding: 15px; background: #f39c12; border: none; color: black; font-weight: bold; cursor: pointer; margin-top: 10px; border-radius: 4px; }
        button:hover { background: #e67e22; }

        table { width: 100%; border-collapse: collapse; margin-top: 20px; font-size: 0.9em; }
        th, td { border: 1px solid #444; padding: 10px; text-align: center; }
        th { background: #d35400; }
        .match { color: #2ecc71; font-weight: bold; }
        .discard { color: #e74c3c; text-decoration: line-through; opacity: 0.6; }
        .highlight { color: #f1c40f; font-weight: bold; }
    </style>
</head>
<body>

<div class="container">
    <h1>Calculador de Estrategia Enemiga</h1>
    
    <div class="setup-section">
        <script>
            const zonasAtaque = {
                1: "Hombro Der (+25% Daño)", 2: "Cabeza (+10% Daño)", 3: "Hombro Izq (0%)",
                4: "Brazo Der (+10% Daño)", 5: "Pecho (+25% Golpe)", 6: "Brazo Izq (+10% Golpe)",
                7: "Pierna Der (+10% Daño)", 8: "Centro (+10% Golpe)", 9: "Pierna Izq (0%)"
            };
            const zonasDefensa = {
                1: "T. Der (1, 4)", 2: "Centro (2, 5)", 3: "T. Izq (3, 6)", 4: "P. Der (4, 7, 5, 8)", 5: "P. Izq (6, 9, 5, 8)"
            };

            for(let i=1; i<=5; i++) {
                document.write(`
                    <div class="armor-card">
                        <div class="armor-title">RONDA ${i}</div>
                        <label>Mi Ataque:</label>
                        <select id="miAtq${i}">${Object.entries(zonasAtaque).map(([k,v]) => `<option value="${k}">${v}</option>`).join('')}</select>
                        <label>Mi Escudo:</label>
                        <select id="miDef${i}">${Object.entries(zonasDefensa).map(([k,v]) => `<option value="${k}">${v}</option>`).join('')}</select>
                    </div>
                `);
            }
        </script>
    </div>

    <div style="display: flex; gap: 10px; align-items: center;">
        <input type="text" id="rivalName" placeholder="Nombre del Rival" style="flex: 1; padding: 10px; background: #333; color: white; border: 1px solid #555;">
        <span style="color: #aaa;">Tu nombre: <b>Rutxe</b></span>
    </div>

    <textarea id="reporte" placeholder="Pega el reporte de batalla aquí..."></textarea>
    <button onclick="analizar()">ANALIZAR TÁCTICA RIVAL</button>

    <div id="resultados"></div>
</div>

<script>
const mapeoEscudos = {
    1: [1, 4], 2: [2, 5], 3: [3, 6], 4: [4, 7, 5, 8], 5: [6, 9, 5, 8]
};

function analizar() {
    const rival = document.getElementById('rivalName').value.trim();
    const texto = document.getElementById('reporte').value;
    if(!rival) return alert("Pon el nombre del rival");

    // Extraer golpes del rival
    const regexDaño = new RegExp(`${rival}.*?(\\d+)\\s+puntos`, 'g');
    const regexFallo = new RegExp(`${rival}No da en el blanco`, 'g');
    const regexBloqueo = new RegExp(`${rival}El golpe es bloqueado`, 'g');
    
    // Extraer cuando TÚ eres bloqueado por el rival
    const regexRivalBloquea = new RegExp(`Rutxe.*?El golpe es bloqueado`, 'g');

    let logs = texto.split('\n').filter(l => l.trim() !== "");
    let turnosRival = [];
    let turnosRutxe = [];
    
    // Simplificación de lectura de turnos correlativos
    let indexRival = 1;
    let indexRutxe = 1;

    // Procesamos el reporte línea a línea para mantener el orden
    logs.forEach(linea => {
        if(linea.includes(rival)) {
            let info = { num: ((indexRival-1)%5)+1, evento: "Golpe", daño: 0 };
            if(linea.includes("No da en el blanco")) info.evento = "Fallo";
            else if(linea.includes("El golpe es bloqueado")) info.evento = "Bloqueado";
            else {
                let m = linea.match(/(\d+)\s+puntos/);
                if(m) info.daño = parseInt(m[1]);
            }
            turnosRival.push(info);
            indexRival++;
        } else if(linea.includes("Rutxe")) {
            let info = { num: ((indexRutxe-1)%5)+1, bloqueado: linea.includes("bloqueado") };
            turnosRutxe.push(info);
            indexRutxe++;
        }
    });

    const promedio = turnosRival.filter(t => t.daño > 0).reduce((a,b)=>a+b.daño, 0) / turnosRival.filter(t=>t.daño>0).length || 0;

    render(turnosRival, turnosRutxe, promedio, rival);
}

function render(tr, tt, prom, rival) {
    let html = `<table><tr><th>Ronda</th><th>Acción de ${rival}</th><th>Análisis de su Ataque</th><th>Análisis de su Escudo</th></tr>`;
    
    for(let i=1; i<=5; i++) {
        let tRival = tr.find(t => t.num === i);
        let tRutxe = tt.find(t => t.num === i);
        let miEscudo = parseInt(document.getElementById(`miDef${i}`).value);
        let miAtaque = parseInt(document.getElementById(`miAtq${i}`).value);
        
        // Lógica de descarte de ataque rival
        let zonasPosibles = "Calculando...";
        if(tRival && tRival.daño > 0) {
            let ratio = tRival.daño / prom;
            if(ratio > 1.15) zonasPosibles = "Hombro Der (1)";
            else if(ratio > 1.05) zonasPosibles = "Cabeza (2) / Brazo D. (4) / Pierna D. (7)";
            else if(ratio > 0.90) zonasPosibles = "Hombro Izq (3) / Pierna Izq (9)";
            else if(ratio > 0.75) zonasPosibles = "Brazo Izq (6) / Centro (8)";
            else zonasPosibles = "Pecho (5)";
        } else if (tRival && tRival.evento === "Bloqueado") {
            zonasPosibles = `<span class="match">Atacó a una de tus zonas: ${mapeoEscudos[miEscudo].join(', ')}</span>`;
        }

        // Lógica de escudo rival
        let escudoRival = "Desconocido";
        if(tRutxe && tRutxe.bloqueado) {
            escudoRival = `<span class="match">Protege zona ${miAtaque}</span>`;
        } else if(tRutxe) {
            escudoRival = `<span class="discard">No cubre zona ${miAtaque}</span>`;
        }

        html += `<tr>
            <td><b>${i}</b></td>
            <td>${tRival ? tRival.evento + (tRival.daño ? ` (${tRival.daño})` : '') : '-'}</td>
            <td>${zonasPosibles}</td>
            <td>${escudoRival}</td>
        </tr>`;
    }
    html += "</table>";
    document.getElementById('resultados').innerHTML = html;
}
</script>
</body>
</html>
