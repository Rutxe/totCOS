<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Analizador Táctico de Élite - Caballería</title>
    <style>
        :root { --gold: #f1c40f; --red: #c0392b; --bg: #121212; --card: #1e1e1e; --shield-blue: #2c3e50; }
        body { font-family: 'Segoe UI', sans-serif; background-color: var(--bg); color: #e0e0e0; margin: 0; padding: 20px; }
        .container { max-width: 1200px; margin: auto; background: var(--card); padding: 25px; border-radius: 12px; border: 1px solid #333; }
        
        .header-battle { text-align: center; border-bottom: 2px solid var(--gold); margin-bottom: 20px; padding-bottom: 10px; }
        
        /* Cuadrícula de Rondas (Igual a la imagen) */
        .rondas-container { display: grid; grid-template-columns: repeat(5, 1fr); gap: 10px; margin-bottom: 30px; }
        .ronda-col { background: #252525; border: 1px solid #444; border-radius: 8px; padding: 10px; }
        .ronda-header { background: #000; color: var(--gold); font-weight: bold; padding: 5px; margin-bottom: 10px; font-size: 0.8em; text-align: center; border-radius: 4px; }

        /* Estilo Armaduras y Puntos */
        .armor-body { position: relative; width: 140px; height: 160px; margin: 0 auto; background: url('https://i.imgur.com/e8f3Y9D.png') no-repeat center; background-size: contain; }
        .dot { position: absolute; width: 22px; height: 22px; background: #1a1a1a; border: 2px solid #555; border-radius: 50%; cursor: pointer; transition: 0.2s; z-index: 10; }
        .dot.active { background: #ff0000; border-color: #fff; box-shadow: 0 0 10px #ff0000; }
        
        /* Posiciones exactas áreas golpeo */
        .p1 { top: 38px; right: 18px; }  .p2 { top: 12px; left: 59px; } .p3 { top: 38px; left: 18px; }
        .p4 { top: 72px; right: 12px; }  .p5 { top: 72px; left: 59px; } .p6 { top: 72px; left: 12px; }
        .p7 { top: 108px; right: 22px; } .p8 { top: 108px; left: 59px; } .p9 { top: 108px; left: 22px; }

        /* Estilo Escudos */
        .shield-box { position: absolute; width: 26px; height: 30px; background: #1a1a1a; clip-path: polygon(0% 0%, 100% 0%, 100% 70%, 50% 100%, 0% 70%); border: 1px solid #555; cursor: pointer; transition: 0.2s; }
        .shield-box.active { background: #ff0000; border-color: #fff; box-shadow: 0 0 10px #ff0000; }
        
        /* Posiciones exactas áreas bloqueo */
        .s1 { top: 65px; right: 15px; } .s2 { top: 75px; left: 57px; } .s3 { top: 65px; left: 15px; }
        .s4 { top: 110px; right: 35px; } .s5 { top: 110px; left: 35px; }

        /* Panel de Control */
        .control-panel { display: flex; gap: 20px; margin-bottom: 20px; }
        textarea { flex: 2; height: 180px; background: #000; color: #0f0; border: 1px solid #444; padding: 15px; border-radius: 8px; font-family: monospace; }
        .inputs-side { flex: 1; display: flex; flex-direction: column; gap: 10px; }
        input { padding: 12px; background: #222; color: white; border: 1px solid var(--gold); border-radius: 5px; }
        button { padding: 15px; background: var(--gold); color: #000; font-weight: bold; border: none; border-radius: 5px; cursor: pointer; font-size: 1.1em; }
        button:hover { background: #d4ac0d; }

        table { width: 100%; border-collapse: collapse; margin-top: 20px; background: #1a1a1a; }
        th, td { border: 1px solid #333; padding: 12px; text-align: center; }
        th { background: #2c3e50; color: var(--gold); }
        .val-block { color: #2ecc71; font-weight: bold; }
        .val-dmg { color: #e74c3c; }
    </style>
</head>
<body>

<div class="container">
    <div class="header-battle">
        <h1>SISTEMA DE ANÁLISIS TÁCTICO POR RONDAS</h1>
    </div>

    <div class="rondas-container" id="gridAtaque">
        </div>

    <div class="rondas-container" id="gridDefensa">
        </div>

    <div class="control-panel">
        <textarea id="reporte" placeholder="Pega aquí el reporte del combate..."></textarea>
        <div class="inputs-side">
            <input type="text" id="rivalName" placeholder="NOMBRE DEL RIVAL">
            <button onclick="analizar()">ANALIZAR DUELO</button>
        </div>
    </div>

    <div id="resultados"></div>
</div>

<script>
let config = Array(5).fill().map(() => ({ atq: 5, def: 2 }));

// Diccionario de bloqueo oficial
const reglasBloqueo = {
    1: [1, 4], 2: [2, 5], 3: [3, 6], 4: [4, 7, 5, 8], 5: [6, 9, 5, 8]
};

function renderVisual() {
    const gAtq = document.getElementById('gridAtaque');
    const gDef = document.getElementById('gridDefensa');
    gAtq.innerHTML = ''; gDef.innerHTML = '';

    for(let i=0; i<5; i++) {
        // Render Ataque
        gAtq.innerHTML += `
            <div class="ronda-col">
                <div class="ronda-header">Ronda ${i+1}<br>Golpe ${i+1}</div>
                <div class="armor-body">
                    ${[1,2,3,4,5,6,7,8,9].map(n => `<div class="dot p${n} ${config[i].atq===n?'active':''}" onclick="setAtq(${i},${n})"></div>`).join('')}
                </div>
            </div>`;
        
        // Render Defensa
        gDef.innerHTML += `
            <div class="ronda-col">
                <div class="ronda-header">Bloqueo ${i+1}</div>
                <div class="armor-body">
                    ${[1,2,3,4,5].map(n => `<div class="shield-box s${n} ${config[i].def===n?'active':''}" onclick="setDef(${i},${n})"></div>`).join('')}
                </div>
            </div>`;
    }
}

function setAtq(r, v) { config[r].atq = v; renderVisual(); }
function setDef(r, v) { config[r].def = v; renderVisual(); }
renderVisual();

function analizar() {
    const rival = document.getElementById('rivalName').value.trim();
    const texto = document.getElementById('reporte').value;
    if(!rival) return alert("Introduce el nombre del rival");

    const lineas = texto.split('\n').map(l => l.trim()).filter(l => l !== "");
    let logRival = [];
    let logMio = [];

    lineas.forEach((l, idx) => {
        if(l.startsWith(rival)) {
            let info = { b: l.includes("bloqueado"), d: 0 };
            let next = lineas[idx+1] || "";
            let m = next.match(/(\d+)\s+puntos de daño físico/);
            if(m) info.d = parseInt(m[1]);
            logRival.push(info);
        } else if(l.toLowerCase().includes("rutxe") || l.toLowerCase().includes("peregrino")) {
            logMio.push(l.includes("bloqueado") || (lineas[idx+1] && lineas[idx+1].includes("bloqueado")));
        }
    });

    // Lógica matemática de daño
    let dmgs = logRival.filter(x => x.d > 0).map(x => x.d);
    let base = Math.min(...dmgs) / 0.75; 

    let html = `<table><tr><th>Rda</th><th>Acción Rival</th><th>Zona Detectada</th><th>Tu Ataque</th><th>Escudo Rival</th></tr>`;

    for(let i=0; i<Math.max(logRival.length, logMio.length); i++) {
        let r = i % 5;
        let tR = logRival[i];
        let tM = logMio[i];
        let miA = config[r].atq;

        let detZona = "-";
        if(tR && tR.d > 0) {
            let ratio = tR.d / base;
            if(ratio > 1.15) detZona = "Hombro Der (1)";
            else if(ratio > 1.05) detZona = "Cabeza/Brazo D/Pierna D (2,4,7)";
            else if(ratio > 0.95) detZona = "Hombro Izq/Pierna Izq (3,9)";
            else if(ratio > 0.85) detZona = "Brazo Izq/Centro (6,8)";
            else detZona = "Pecho (5)";
        } else if(tR && tR.b) detZona = "<span class='val-block'>BLOQUEADO</span>";

        let escRiv = "Impacto";
        if(tM) {
            let p = [];
            for(let e in reglasBloqueo) if(reglasBloqueo[e].includes(miA)) p.push(e);
            escRiv = "<span class='val-block'>Escudo " + p.join("/") + "</span>";
        }

        html += `<tr><td>${i+1}</td><td>${tR ? (tR.b ? 'Bloqueo' : tR.d + ' dmg') : '-'}</td><td>${detZona}</td><td>Z${miA}</td><td>${tM ? escRiv : 'Limpio'}</td></tr>`;
    }
    document.getElementById('resultados').innerHTML = html + "</table>";
}
</script>
</body>
</html>
