<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Analizador de Combate - Versión Final</title>
    <style>
        :root { --gold: #f1c40f; --red: #c0392b; --bg: #121212; --card: #1e1e1e; }
        body { font-family: 'Segoe UI', sans-serif; background-color: var(--bg); color: #e0e0e0; margin: 0; padding: 20px; }
        .container { max-width: 1100px; margin: auto; background: var(--card); padding: 20px; border-radius: 12px; border: 1px solid #333; }
        
        /* Cuadrícula de 5 columnas para las 5 rondas */
        .rondas-container { display: grid; grid-template-columns: repeat(5, 1fr); gap: 10px; margin-bottom: 20px; }
        .ronda-col { background: #252525; border: 1px solid #444; border-radius: 8px; padding: 10px; text-align: center; }
        .ronda-header { background: #000; color: var(--gold); padding: 5px; margin-bottom: 10px; font-size: 0.8em; border-radius: 4px; font-weight: bold; }

        /* Armadura Visual */
        .armor-body { position: relative; width: 120px; height: 140px; margin: 0 auto; background: rgba(255,255,255,0.05); border-radius: 10px; border: 1px dashed #444; }
        
        /* Puntos de Golpeo (1-9) */
        .dot { position: absolute; width: 18px; height: 18px; background: #333; border: 2px solid #555; border-radius: 50%; cursor: pointer; z-index: 10; }
        .dot.active { background: #ff0000; border-color: #fff; box-shadow: 0 0 8px #ff0000; }
        .p1 { top: 30px; right: 15px; } .p2 { top: 5px; left: 51px; } .p3 { top: 30px; left: 15px; }
        .p4 { top: 60px; right: 10px; } .p5 { top: 60px; left: 51px; } .p6 { top: 60px; left: 10px; }
        .p7 { top: 90px; right: 20px; } .p8 { top: 90px; left: 51px; } .p9 { top: 90px; left: 20px; }

        /* Escudos de Bloqueo (1-5) */
        .shield-box { position: absolute; width: 22px; height: 26px; background: #333; clip-path: polygon(0% 0%, 100% 0%, 100% 70%, 50% 100%, 0% 70%); border: 1px solid #555; cursor: pointer; }
        .shield-box.active { background: #ff0000; border-color: #fff; box-shadow: 0 0 8px #ff0000; }
        .s1 { top: 55px; right: 15px; } .s2 { top: 65px; left: 49px; } .s3 { top: 55px; left: 15px; }
        .s4 { top: 100px; right: 30px; } .s5 { top: 100px; left: 30px; }

        textarea { width: 100%; height: 150px; background: #000; color: #0f0; border: 1px solid #444; padding: 10px; font-family: monospace; margin: 10px 0; }
        button { width: 100%; padding: 15px; background: var(--gold); border: none; font-weight: bold; cursor: pointer; border-radius: 5px; font-size: 1.1em; }
        
        table { width: 100%; border-collapse: collapse; margin-top: 20px; font-size: 0.9em; }
        th, td { border: 1px solid #333; padding: 10px; text-align: center; }
        th { background: #2c3e50; color: var(--gold); }
        .res-crit { color: var(--gold); font-weight: bold; }
        .res-block { color: #2ecc71; font-weight: bold; }
    </style>
</head>
<body>

<div class="container">
    <h2 style="text-align:center; color:var(--gold);">ANALIZADOR DE RONDAS Y DAÑO</h2>
    
    <div class="rondas-container" id="atqGrid"></div>
    <div class="rondas-container" id="defGrid"></div>

    <input type="text" id="rivalName" placeholder="Nombre del Rival (Ej: Sir Naka)" style="width:100%; padding:10px; background:#222; color:white; border:1px solid var(--gold); box-sizing:border-box;">
    <textarea id="reporte" placeholder="Pega el reporte aquí..."></textarea>
    <button onclick="analizar()">ANALIZAR GOLPES Y ESCUDOS</button>

    <div id="resultados"></div>
</div>

<script>
let config = Array(5).fill().map(() => ({ atq: 5, def: 2 }));
const escudosOficiales = { 1:[1,4], 2:[2,5], 3:[3,6], 4:[4,7,5,8], 5:[6,9,5,8] };

function render() {
    const aG = document.getElementById('atqGrid');
    const dG = document.getElementById('defGrid');
    aG.innerHTML = ''; dG.innerHTML = '';
    for(let i=0; i<5; i++) {
        aG.innerHTML += `<div class="ronda-col"><div class="ronda-header">GOLPE ${i+1}</div><div class="armor-body">${[1,2,3,4,5,6,7,8,9].map(n=>`<div class="dot p${n} ${config[i].atq===n?'active':''}" onclick="setAtq(${i},${n})"></div>`).join('')}</div></div>`;
        dG.innerHTML += `<div class="ronda-col"><div class="ronda-header">BLOQUEO ${i+1}</div><div class="armor-body">${[1,2,3,4,5].map(n=>`<div class="shield-box s${n} ${config[i].def===n?'active':''}" onclick="setDef(${i},${n})"></div>`).join('')}</div></div>`;
    }
}
function setAtq(r,v){ config[r].atq=v; render(); }
function setDef(r,v){ config[r].def=v; render(); }
render();

function analizar() {
    const rival = document.getElementById('rivalName').value.trim();
    const texto = document.getElementById('reporte').value;
    if(!rival) return alert("Escribe el nombre del rival");

    const lineas = texto.split('\n').map(l => l.trim()).filter(l => l !== "");
    let dataRival = [];
    let dataMio = [];

    for (let i = 0; i < lineas.length; i++) {
        let l = lineas[i];
        if (l.startsWith(rival)) {
            let dFis = 0;
            let bloqueado = l.includes("bloqueado");
            // Buscar daño físico en la misma línea o en la siguiente
            let busqueda = l + " " + (lineas[i+1] || "");
            let match = busqueda.match(/(\d+)\s+puntos de daño físico/);
            if(match) dFis = parseInt(match[1]);
            dataRival.push({ bloqueado, dFis });
        } else if (l.toLowerCase().includes("peregrino") || l.startsWith("Rutxe")) {
            let fueBloqueado = l.includes("bloqueado") || (lineas[i+1] && lineas[i+1].includes("bloqueado"));
            dataMio.push(fueBloqueado);
        }
    }

    // Calcular daño base (usando el máximo para evitar errores con los "1" de daño)
    let dmgs = dataRival.filter(x => x.dFis > 5).map(x => x.dFis);
    let maxD = Math.max(...dmgs);
    let base = maxD / 1.25; // Asumimos que el más alto es +25%

    let res = `<table><tr><th>Turno</th><th>Daño Rival</th><th>Zona Detectada (Rival)</th><th>Tu Ataque</th><th>Escudo Rival</th></tr>`;

    for(let i=0; i < Math.max(dataRival.length, dataMio.length); i++) {
        let rIdx = i % 5;
        let tR = dataRival[i];
        let miA = config[rIdx].atq;

        let zona = "-";
        if(tR) {
            if(tR.bloqueado) zona = "<span class='res-block'>BLOQUEADO</span>";
            else if(tR.dFis > 0) {
                let ratio = tR.dFis / base;
                if(ratio > 1.15) zona = "Hombro Der (1)";
                else if(ratio > 1.05) zona = "2, 4 o 7 (+10%)";
                else if(ratio > 0.95) zona = "3 o 9 (0%)";
                else if(ratio > 0.85) zona = "6 u 8 (-10%)";
                else zona = "Pecho (5)";
            }
        }

        let escRival = "Limpio";
        if(dataMio[i]) {
            let p = [];
            for(let e in escudosOficiales) if(escudosOficiales[e].includes(miA)) p.push(e);
            escRival = "<span class='res-block'>Escudo " + p.join("/") + "</span>";
        }

        res += `<tr><td>${i+1}</td><td>${tR ? tR.dFis : '-'}</td><td>${zona}</td><td>Z${miA}</td><td>${escRival}</td></tr>`;
    }
    document.getElementById('resultados').innerHTML = res + "</table>";
}
</script>
</body>
</html>
