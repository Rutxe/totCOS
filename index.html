<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Panel de Combate - Rutxe Edition</title>
    <style>
        :root { --gold: #f39c12; --red: #e74c3c; --bg: #1a1a1a; --card: #2c2c2c; }
        body { font-family: 'Segoe UI', sans-serif; background-color: var(--bg); color: #eee; margin: 0; padding: 20px; }
        .container { max-width: 1100px; margin: auto; }
        h1 { text-align: center; color: var(--gold); }

        .rondas-grid { display: grid; grid-template-columns: repeat(5, 1fr); gap: 10px; margin-bottom: 20px; }
        .ronda-card { background: var(--card); border: 1px solid #444; border-radius: 8px; padding: 10px; text-align: center; }
        .ronda-title { font-weight: bold; margin-bottom: 10px; color: var(--gold); border-bottom: 1px solid #444; }

        /* Estilo Armadura Visual */
        .armor-map { position: relative; width: 140px; height: 160px; margin: 0 auto 15px; background: #333; border-radius: 10px; border: 1px dashed #555; }
        .dot { position: absolute; width: 22px; height: 22px; background: #555; border-radius: 50%; border: 2px solid #222; cursor: pointer; transition: 0.2s; font-size: 10px; line-height: 22px; color: white; }
        .dot.active { background: var(--red); box-shadow: 0 0 10px var(--red); border-color: white; }
        
        /* Posiciones aproximadas según tu imagen */
        .p1 { top: 35px; right: 20px; } .p2 { top: 5px; left: 59px; } .p3 { top: 35px; left: 20px; }
        .p4 { top: 70px; right: 15px; } .p5 { top: 70px; left: 59px; } .p6 { top: 70px; left: 15px; }
        .p7 { top: 105px; right: 25px; } .p8 { top: 105px; left: 59px; } .p9 { top: 105px; left: 25px; }

        /* Escudos Visuales */
        .shield-map { display: flex; justify-content: center; gap: 5px; margin-top: 10px; }
        .shield { width: 25px; height: 30px; background: #444; clip-path: polygon(0% 0%, 100% 0%, 100% 70%, 50% 100%, 0% 70%); cursor: pointer; font-size: 10px; display: flex; align-items: center; justify-content: center; border: 1px solid #222; }
        .shield.active { background: var(--red); color: white; font-weight: bold; }

        textarea { width: 100%; height: 100px; background: #111; color: #0f0; border: 1px solid #555; padding: 10px; margin: 15px 0; border-radius: 5px; }
        button#analizar { width: 100%; padding: 15px; background: var(--gold); border: none; font-weight: bold; cursor: pointer; border-radius: 5px; font-size: 1.1em; }
        
        .res-table { width: 100%; border-collapse: collapse; margin-top: 20px; }
        .res-table th, .res-table td { border: 1px solid #444; padding: 12px; text-align: center; }
        .res-table th { background: #d35400; }
        .posible { color: #f1c40f; font-weight: bold; }
        .seguro { color: #2ecc71; font-weight: bold; }
    </style>
</head>
<body>

<div class="container">
    <h1>Análisis Táctico: Rutxe vs Rival</h1>
    
    <div class="rondas-grid" id="setupRondas">
        </div>

    <div style="text-align: center; margin-bottom: 10px;">
        <input type="text" id="rivalName" placeholder="NOMBRE DEL RIVAL" style="padding: 10px; width: 250px; background: #333; color: white; border: 1px solid var(--gold);">
    </div>

    <textarea id="reporte" placeholder="Pega aquí el reporte de la batalla..."></textarea>
    <button id="analizar" onclick="analizar()">CALCULAR ESTRATEGIA RIVAL</button>

    <div id="resultados"></div>
</div>

<script>
// Configuración inicial de las 5 rondas
const setupRondas = document.getElementById('setupRondas');
let config = Array(5).fill().map(() => ({ atq: 5, def: 2 })); // Por defecto Pecho y Centro

function drawUI() {
    setupRondas.innerHTML = '';
    for(let i=0; i<5; i++) {
        let card = document.createElement('div');
        card.className = 'ronda-card';
        card.innerHTML = `
            <div class="ronda-title">RONDA ${i+1}</div>
            <div class="armor-map">
                ${[1,2,3,4,5,6,7,8,9].map(n => `<div class="dot p${n} ${config[i].atq === n ? 'active' : ''}" onclick="setAtq(${i}, ${n})">${n}</div>`).join('')}
            </div>
            <span>Escudo:</span>
            <div class="shield-map">
                ${[1,2,3,4,5].map(n => `<div class="shield ${config[i].def === n ? 'active' : ''}" onclick="setDef(${i}, ${n})">${n}</div>`).join('')}
            </div>
        `;
        setupRondas.appendChild(card);
    }
}

function setAtq(ronda, zona) { config[ronda].atq = zona; drawUI(); }
function setDef(ronda, zona) { config[ronda].def = zona; drawUI(); }

drawUI();

const bloqueosEscudo = { 1:[1,4], 2:[2,5], 3:[3,6], 4:[4,7,5,8], 5:[6,9,5,8] };

function analizar() {
    const rival = document.getElementById('rivalName').value.trim();
    const texto = document.getElementById('reporte').value;
    if(!rival) return alert("Escribe el nombre del rival");

    const lineas = texto.split(/\r?\n/).filter(l => l.trim() !== "");
    let turnosRival = [];
    let turnosRutxe = [];
    let cRival = 0, cRutxe = 0;

    lineas.forEach(linea => {
        if(linea.includes(rival)) {
            let info = { ronda: (cRival % 5), ev: "Impacto", daño: 0 };
            if(linea.includes("No da en el blanco")) info.ev = "Fallo";
            else if(linea.includes("bloqueado")) info.ev = "Bloqueado";
            else {
                let m = linea.match(/(\d+)\s+puntos/);
                if(m) info.daño = parseInt(m[1]);
            }
            turnosRival.push(info);
            cRival++;
        } else if(linea.includes("Rutxe")) {
            turnosRutxe.push({ ronda: (cRutxe % 5), bloqueado: linea.includes("bloqueado") });
            cRutxe++;
        }
    });

    const prom = turnosRival.filter(t => t.daño > 0).reduce((a,b)=>a+b.daño,0) / turnosRival.filter(t=>t.daño>0).length || 0;

    let html = `<table class="res-table"><tr><th>Ronda</th><th>Su Ataque</th><th>Su Escudo</th></tr>`;
    
    for(let i=0; i<5; i++) {
        let tRiv = turnosRival.find(t => t.ronda === i);
        let tRut = turnosRutxe.find(t => t.ronda === i);
        let miDef = config[i].def;
        let miAtq = config[i].atq;

        // Deducción Ataque Rival
        let ataqueDeducido = "Analizando...";
        if(tRiv) {
            if(tRiv.ev === "Bloqueado") {
                ataqueDeducido = `<span class="seguro">Zona ${bloqueosEscudo[miDef].join(' o ')}</span>`;
            } else if(tRiv.daño > 0) {
                let ratio = tRiv.daño / prom;
                let zonas = ratio > 1.15 ? "Hombro D. (1)" : (ratio > 1.05 ? "2, 4 o 7" : (ratio > 0.9 ? "3 o 9" : "6, 8 o 5"));
                ataqueDeducido = `<span class="posible">${zonas}</span> (No bloqueaste zona correcta)`;
            } else {
                ataqueDeducido = "Fallo de puntería";
            }
        }

        // Deducción Escudo Rival
        let escudoDeducido = "Desconocido";
        if(tRut) {
            escudoDeducido = tRut.bloqueado ? `<span class="seguro">Cubre zona ${miAtq}</span>` : `<span style="color:#888">No cubre zona ${miAtq}</span>`;
        }

        html += `<tr><td><b>${i+1}</b></td><td>${ataqueDeducido}</td><td>${escudoDeducido}</td></tr>`;
    }
    document.getElementById('resultados').innerHTML = html + "</table>";
}
</script>
</body>
</html>
