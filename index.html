<style>
    /* ... (Mantenemos tu base y añadimos/ajustamos esto) ... */
    :root { --gold: #f1c40f; --red: #c0392b; --green: #2ecc71; --bg: #121212; }
    
    .shield-icon { 
        font-size: 1.2em; 
        margin-right: 5px;
    }

    .status-block { 
        background: rgba(46, 204, 113, 0.2); 
        color: var(--green); 
        padding: 4px 8px; 
        border-radius: 4px; 
        border: 1px solid var(--green);
        font-weight: bold;
    }

    .status-hit { 
        background: rgba(192, 57, 43, 0.2); 
        color: #ff7675; 
        padding: 4px 8px; 
        border-radius: 4px; 
        border: 1px solid var(--red);
    }

    .prediccion-escudo {
        background: #2c3e50;
        border-left: 4px solid var(--gold);
        padding: 10px;
        margin-top: 20px;
        border-radius: 0 8px 8px 0;
    }
</style>

<script>
let config = Array(5).fill().map(() => ({ atq: 5, def: 2 }));
// Diccionario de zonas que cubre cada posición de escudo
const zonasQueBloquea = { 1:[1,4], 2:[2,5], 3:[3,6], 4:[4,7,5,8], 5:[6,9,5,8] };

function draw() {
    const container = document.getElementById('setupRondas');
    container.innerHTML = '';
    config.forEach((c, i) => {
        container.innerHTML += `
            <div class="ronda-card">
                <div class="ronda-title">RONDA ${i+1}</div>
                <div class="armor-map">
                    ${[1,2,3,4,5,6,7,8,9].map(n => `<div class="dot p${n} ${c.atq===n?'active':''}" onclick="setAtq(${i},${n})">${n}</div>`).join('')}
                </div>
                <div class="shield-map">
                    ${[1,2,3,4,5].map(n => `<div class="shield ${c.def===n?'active':''}" onclick="setDef(${i},${n})">${n}</div>`).join('')}
                </div>
            </div>`;
    });
}

function setAtq(r, z) { config[r].atq = z; draw(); }
function setDef(r, z) { config[r].def = z; draw(); }
draw();

function analizar() {
    const rival = document.getElementById('rivalName').value.trim();
    const texto = document.getElementById('reporte').value;
    if(!rival) return alert("Indica el nombre del rival");

    const lineas = texto.split('\n').map(l => l.trim()).filter(l => l !== "");
    
    let turnosRival = [];
    let turnosRutxe = [];
    
    // Procesamiento inteligente del reporte
    lineas.forEach((linea, index) => {
        if (linea.startsWith(rival)) {
            let data = { ev: "Golpe", dañoFis: 0, dañoEle: 0, crit: linea.includes("crítico") };
            if (linea.includes("bloqueado")) data.ev = "Bloqueado";
            
            // Buscar daño en la línea siguiente si existe
            let sigLinea = lineas[index+1] || "";
            let matchDmg = sigLinea.match(/(\d+)\s+puntos de daño físico y (\d+)/);
            if(matchDmg) {
                data.dañoFis = parseInt(matchDmg[1]);
                data.dañoEle = parseInt(matchDmg[2]);
            }
            turnosRival.push(data);
        } 
        else if (linea.startsWith("Rutxe") || linea.startsWith("peregrino")) { // Ajustado para tu ejemplo
            let fueBloqueado = linea.includes("bloqueado") || (lineas[index+1] && lineas[index+1].includes("bloqueado"));
            turnosRutxe.push({ bloqueado: fueBloqueado });
        }
    });

    let tabla = `<table>
        <tr>
            <th>Rda</th>
            <th>Acción Rival</th>
            <th>Tu Defensa (Escudo)</th>
            <th>Tu Ataque vs Rival</th>
        </tr>`;

    for(let i=0; i < Math.max(turnosRival.length, turnosRutxe.length); i++) {
        let rdaNum = (i % 5) + 1;
        let tRival = turnosRival[i];
        let tYo = turnosRutxe[i];
        let miDef = config[i % 5].def;
        let miAtq = config[i % 5].atq;

        // 1. Lógica de tu escudo (Defensa)
        let statusDef = "-";
        if(tRival) {
            if(tRival.ev === "Bloqueado") {
                statusDef = `<span class="status-block">🛡️ BLOQUEADO (Zona ${zonasQueBloquea[miDef].join('/')})</span>`;
            } else {
                statusDef = `<span class="status-hit">💥 RECIBIDO (${tRival.dañoFis} Fís / ${tRival.dañoEle} Ele)</span>`;
            }
        }

        // 2. Lógica del escudo del RIVAL (Tu Ataque)
        let statusAtq = "-";
        if(tYo) {
            if(tYo.bloqueado) {
                statusAtq = `<span class="status-block">🛡️ RIVAL BLOQUEÓ (Zona ${miAtq})</span>`;
            } else {
                statusAtq = `<span class="status-hit">⚔️ IMPACTO LIMPIO</span>`;
            }
        }

        tabla += `<tr>
            <td>${i+1} (R${rdaNum})</td>
            <td>${tRival ? tRival.ev : '-'}</td>
            <td>${statusDef}</td>
            <td>${statusAtq}</td>
        </tr>`;
    }

    document.getElementById('resultados').innerHTML = tabla + "</table>";
}
</script>
