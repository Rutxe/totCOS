<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Calculador de Estrategia - Duelos de Caballeros</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: #2c2f33; color: #ffffff; padding: 20px; }
        .container { max-width: 900px; margin: auto; background: #23272a; padding: 20px; border-radius: 10px; box-shadow: 0 4px 15px rgba(0,0,0,0.5); }
        h1 { text-align: center; color: #e67e22; border-bottom: 2px solid #e67e22; padding-bottom: 10px; }
        textarea { width: 100%; height: 150px; background: #484c52; color: white; border: 1px solid #7289da; border-radius: 5px; padding: 10px; box-sizing: border-box; }
        button { width: 100%; padding: 15px; margin-top: 10px; cursor: pointer; background: #e67e22; border: none; color: white; font-weight: bold; border-radius: 5px; transition: 0.3s; }
        button:hover { background: #d35400; }
        .results { margin-top: 20px; }
        table { width: 100%; border-collapse: collapse; margin-top: 10px; background: #2f3136; }
        th, td { border: 1px solid #444; padding: 12px; text-align: center; }
        th { background: #e67e22; color: white; }
        .highlight { font-weight: bold; color: #ffcc00; }
        .block-event { color: #e74c3c; font-weight: bold; }
        .miss-event { color: #95a5a6; }
    </style>
</head>
<body>

<div class="container">
    <h1>Análisis de Combate de Caballeros</h1>
    
    <p>Pega aquí el reporte de batalla completo:</p>
    <textarea id="reporte" placeholder="Ejemplo: L_Kartierdarck Golpe crítico. Causa un golpe de 692 puntos..."></textarea>
    
    <label for="rivalName">Nombre del Rival:</label>
    <input type="text" id="rivalName" placeholder="Ej: Rutxe" style="padding: 5px; margin-bottom: 10px;">
    
    <button onclick="analizarCombate()">Analizar Patrón del Rival</button>

    <div id="resumenBase" class="results"></div>
    <div id="resultadoTabla" class="results"></div>
</div>

<script>
function analizarCombate() {
    const texto = document.getElementById('reporte').value;
    const rival = document.getElementById('rivalName').value.trim();
    
    if (!rival) {
        alert("Por favor, introduce el nombre del rival para filtrar.");
        return;
    }

    // Expresiones regulares para capturar daño y eventos
    const lineas = texto.split('\n');
    let turnosRival = [];
    let contadorGolpeGlobal = 1;

    // Procesar el texto plano (el formato del juego suele venir mezclado)
    // Buscamos patrones: "Nombre Causa un golpe de X", "Nombre No da en el blanco", "Nombre El golpe es bloqueado"
    
    // El reporte del usuario es un bloque de texto, intentaremos segmentarlo por el nombre del rival
    const segmentos = texto.split(rival);
    
    // El primer segmento suele ser el atacante anterior, lo ignoramos
    // Empezamos desde el 1 porque el split deja basura antes de la primera mención
    let dataProcesada = [];
    
    // Necesitamos saber en qué posición de la ronda (1-5) está cada acción del rival
    // IMPORTANTE: Asumimos que el rival ataca una vez por ronda de forma fija
    let golpeActual = 1;

    for (let i = 1; i < segmentos.length; i++) {
        let fragmento = segmentos[i];
        let info = {
            rondaPos: ((golpeActual - 1) % 5) + 1,
            daño: 0,
            evento: ""
        };

        if (fragmento.includes("puntos de daño físico")) {
            const match = fragmento.match(/(\d+)\s+puntos/);
            if (match) info.daño = parseInt(match[1]);
            info.evento = "Impacto";
        } else if (fragmento.includes("No da en el blanco")) {
            info.evento = "Fallo";
        } else if (fragmento.includes("El golpe es bloqueado")) {
            info.evento = "Bloqueado";
        }

        if (info.evento !== "") {
            dataProcesada.push(info);
            golpeActual++;
        }
    }

    // Calcular daño base promedio para detectar modificadores
    const golpesConDaño = dataProcesada.filter(d => d.daño > 0);
    const promedioDaño = golpesConDaño.reduce((a, b) => a + b.daño, 0) / golpesConDaño.length;

    mostrarResultados(dataProcesada, promedioDaño);
}

function estimarZona(daño, promedio) {
    if (daño === 0) return "---";
    const ratio = daño / promedio;

    if (ratio > 1.18) return "Hombro Derecho (+25% Daño)";
    if (ratio > 1.05) return "Cabeza/Brazo D./Pierna D. (+10% Daño)";
    if (ratio > 0.95) return "Hombro Izq / Pierna Izq (0%)";
    if (ratio > 0.80) return "Brazo Izq / Centro (-10% Daño)";
    return "Pecho (-25% Daño)";
}

function mostrarResultados(data, promedio) {
    let html = `<h3>Promedio de daño detectado: ${Math.round(promedio)}</h3>`;
    html += `<table><tr><th>Golpe</th><th>Acción Rival</th><th>Daño Físico</th><th>Zona Probable de Ataque</th><th>Posible Bloqueo (si tú atacaste)</th></tr>`;

    // Agrupar por la posición 1-5
    let resumenRondas = {1:[], 2:[], 3:[], 4:[], 5:[]};

    data.forEach(item => {
        const zona = estimarZona(item.daño, promedio);
        resumenRondas[item.rondaPos].push(zona !== "---" ? zona : item.evento);

        html += `<tr>
            <td>${item.rondaPos}</td>
            <td class="${item.evento === 'Bloqueado' ? 'block-event' : ''}">${item.evento}</td>
            <td>${item.daño || '-'}</td>
            <td class="highlight">${zona}</td>
            <td>${item.evento === 'Bloqueado' ? 'Escudo Activo en Posición ' + item.rondaPos : '-'}</td>
        </tr>`;
    });

    html += `</table>`;
    document.getElementById('resultadoTabla').innerHTML = html;

    // Resumen de deducción
    let deduccion = "<h3>Deducción de Estrategia:</h3><ul>";
    for(let i=1; i<=5; i++) {
        const opciones = resumenRondas[i].filter(o => o !== "Fallo" && o !== "Bloqueado");
        const masFrecuente = opciones.length > 0 ? opciones[0] : "Datos insuficientes (Fallo/Bloqueo)";
        deduccion += `<li><b>Ronda ${i}:</b> El rival tiende a atacar a <span class='highlight'>${masFrecuente}</span></li>`;
    }
    deduccion += "</ul>";
    document.getElementById('resumenBase').innerHTML = deduccion;
}
</script>

</body>
</html>
