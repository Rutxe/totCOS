<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Calculador de Estrategia Exacta - Caballería</title>
    <style>
        :root { --gold: #f1c40f; --red: #e74c3c; --blue: #3498db; --bg: #121212; }
        body { font-family: 'Segoe UI', sans-serif; background-color: var(--bg); color: #e0e0e0; padding: 20px; }
        .container { max-width: 1000px; margin: auto; background: #1e1e1e; padding: 20px; border-radius: 12px; border: 1px solid #333; }
        .rondas-grid { display: grid; grid-template-columns: repeat(5, 1fr); gap: 10px; margin-bottom: 20px; }
        .ronda-card { background: #252525; border: 2px solid #444; border-radius: 8px; padding: 10px; text-align: center; }
        .armor-map { position: relative; width: 80px; height: 100px; margin: 0 auto; background: #333; border-radius: 5px; }
        .dot { position: absolute; width: 16px; height: 16px; background: #444; border-radius: 50%; border: 1px solid #000; cursor: pointer; font-size: 9px; line-height: 16px; }
        .dot.active { background: var(--red); color: white; box-shadow: 0 0 5px var(--red); }
        /* Posiciones */
        .p1 { top: 20px; right: 5px; } .p2 { top: 2px; left: 32px; } .p3 { top: 20px; left: 5px; }
        .p4 { top: 45px; right: 2px; } .p5 { top: 45px; left: 32px; } .p6 { top: 45px; left: 2px; }
        .p7 { top: 70px; right: 8px; } .p8 { top: 70px; left: 32px; } .p9 { top: 70px; left: 8px; }
        
        textarea { width: 100%; height: 150px; background: #000; color: #0f0; border: 1px solid #444; padding: 10px; margin-top: 10px; font-family: monospace; }
        button { width: 100%; padding: 15px; background: var(--gold); border: none; font-weight: bold; cursor: pointer; border-radius: 8px; margin-top: 10px; }
        table { width: 100%; border-collapse: collapse; margin-top: 20px; }
        th, td { border: 1px solid #333; padding: 8px; text-align: center; }
        .zona-det { color: var(--gold); font-weight: bold; }
    </style>
</head>
<body>

<div class="container">
    <h2 style="color:var(--gold); text-align:center;">ANALIZADOR DE MODIFICADORES</h2>
    <div class="rondas-grid" id="setupRondas"></div>
    <input type="text" id="rivalName" placeholder="Nombre del Rival" style="width:100%; padding:10px; box-sizing:border-box; background:#222; color:white; border:1px solid #444;">
    <textarea id="reporte" placeholder="Pega el reporte aquí..."></textarea>
    <button onclick="analizar()">CALCULAR ZONAS POR DAÑO EXACTO</button>
    <div id="resultados"></div>
</div>

<script>
let config = Array(5).fill().map(() => ({ atq: 5 }));
const mods = { 1: 1.25, 2: 1.10, 3: 1.0, 4: 1.10, 5: 0.75, 6: 0.90, 7: 1.10, 8: 0.90, 9: 1.0 };
const escudos = { 1:[1,4], 2:[2,5], 3:[3,6], 4:[4,7,5,8], 5:[6,9,5,8] };

function draw() {
    const container = document.getElementById('setupRondas');
    container.innerHTML = '';
    config.forEach((c, i) => {
        container.innerHTML += `
            <div class="ronda-card">
                <div style="font-size:10px; color:gray;">TU ATAQUE R${i+1}</div>
                <div class="armor-map">
                    ${[1,2,3,4,5,6,7,8,9].map(n => `<div class="dot p${n} ${c.atq===n?'active':''}" onclick="setAtq(${i},${n})">${n}</div>`).join('')}
                </div>
            </div>`;
    });
}
function setAtq(r, z) { config[r].atq = z; draw(); }
draw();

function analizar() {
    const rival = document.getElementById('rivalName').value.trim();
    const texto = document.getElementById('reporte').value;
    const lineas = texto.split('\n').map(l => l.trim()).filter(l => l !== "");
    
    let golpesRival = [];
    let misBloqueos = [];

    // Extraer datos del reporte
    lineas.forEach((l, i) => {
        if (l.startsWith(rival)) {
            let info = { bloqueado: l.includes("bloqueado"), dmg: 0 };
            let next = lineas[i+1] || "";
            let m = next.match(/Causa un golpe de (\d+)/);
            if(m) info.dmg = parseInt(m[1]);
            golpesRival.push(info);
        } else if (l.toLowerCase().includes("rutxe") || l.toLowerCase().includes("peregrino")) {
            misBloqueos.push(l.includes("bloqueado") || (lineas[i+1] && lineas[i+1].includes("bloqueado")));
        }
    });

    // --- EL CORAZÓN DEL CÁLCULO ---
    // Buscamos el daño base (100%) asumiendo que el daño más bajo es el -25% (Pecho)
    // O el más alto es el +25% (Hombro Der).
    let dmgs = golpesRival.filter(g => g.dmg > 0).map(g => g.dmg);
    let minD = Math.min(...dmgs);
    let maxD = Math.max(...dmgs);
    
    // Si el mínimo es Pecho (0.75), el daño base es min / 0.75
    let baseCalculada = minD / 0.75; 

    let res = `<table><tr><th>Golpe</th><th>Daño</th><th>Modif.</th><th>Zona Rival Detectada</th><th>Escudo Rival</th></tr>`;

    golpesRival.forEach((g, i) => {
        let zona = "Desconocida";
        let modDetectado = "-";
        
        if (g.bloqueado) {
            zona = "BLOQUEADO";
        } else if (g.dmg > 0) {
            let ratio = g.dmg / baseCalculada;
            // Comparar ratio con los modificadores oficiales
            if (ratio > 1.18) { zona = "1 (Hombro Der)"; modDetectado = "+25%"; }
            else if (ratio > 1.05) { zona = "2, 4 o 7 (Cabeza/Derecha)"; modDetectado = "+10%"; }
            else if (ratio > 0.95) { zona = "3 o 9 (Izquierda)"; modDetectado = "0%"; }
            else if (ratio > 0.85) { zona = "6 u 8 (Brazo Izq/Centro)"; modDetectado = "-10%"; }
            else { zona = "5 (Pecho)"; modDetectado = "-25%"; }
        }

        // ¿Qué escudo tiene el rival? Miramos tu ataque en esa ronda
        let miAtq = config[i % 5].atq;
        let escRival = "No bloqueó";
        if (misBloqueos[i]) {
            let posibles = [];
            for (let e in escudos) {
                if (escudos[e].includes(miAtq)) posibles.push(e);
            }
            escRival = "Lleva Escudo " + posibles.join(" o ");
        }

        res += `<tr><td>${i+1}</td><td>${g.dmg}</td><td>${modDetectado}</td><td class="zona-det">${zona}</td><td>${escRival}</td></tr>`;
    });

    document.getElementById('resultados').innerHTML = res + "</table>";
}
</script>
</body>
</html>
